/* Aguja para tacómetro: se registra una sola vez y solo dibuja en doughnut */
const needlePlugin = {
  id: "needle",
  afterDraw(chart, args, pluginOptions) {
    if (chart.config.type !== "doughnut") return;

    const meta0 = chart.getDatasetMeta(0);
    if (!meta0 || !meta0.data || !meta0.data[0]) return;

    const { value = 0, meta = 0 } = pluginOptions || {};
    const v = Math.max(0, Math.min(100, Number(value)));

    const cx = meta0.data[0].x;
    const cy = meta0.data[0].y;
    const { ctx, chartArea } = chart;

    const radius = Math.min(
      (chartArea.right - chartArea.left),
      (chartArea.bottom - chartArea.top)
    ) / 2;

    // Ángulo (180° → 0..100)
    const angle = Math.PI + (v / 100) * Math.PI;

    // Aguja
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.lineTo(radius * 0.75, 0);
    ctx.lineTo(0, 4);
    ctx.fillStyle = "#111";
    ctx.fill();
    ctx.restore();

    // Pivote
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
    ctx.fillStyle = "#111";
    ctx.fill();

    // Texto
    ctx.font = "700 28px Inter, Segoe UI, sans-serif";
    ctx.fillStyle = v >= meta ? "#16a34a" : "#dc2626";
    ctx.textAlign = "center";
    ctx.fillText(`${v.toFixed(1)}%`, cx, cy - 22);

    ctx.font = "500 14px Inter, Segoe UI, sans-serif";
    ctx.fillStyle = "#334155";
    ctx.fillText(`Meta: ${meta}%`, cx, cy + 12);
  }
};
Chart.register(needlePlugin);

/* ===========================
   TACÓMETRO PROFESIONAL
=========================== */
function crearTacometro(anio, mes, ind, canvas) {

  document.getElementById("chartTitle").innerText = "Indicador del período";

  const info = indicadores[ind];
  let valor = info?.resultado?.[anio]?.[mes] ?? 0;
  let meta = info?.meta ?? 100;

  valor = Number(valor) || 0;
  meta = Number(meta) || 100;

  // 🔹 Variación mes anterior
  const indexMes = meses.indexOf(mes);
  let valorAnteriorMes = null;

  if (indexMes > 0) {
    const mesAnterior = meses[indexMes - 1];
    valorAnteriorMes = info?.resultado?.[anio]?.[mesAnterior] ?? null;
  }

  const variacionMes = valorAnteriorMes != null
    ? valor - Number(valorAnteriorMes)
    : null;

  // 🔹 Variación mismo mes año anterior
  const anioAnterior = String(Number(anio) - 1);
  const valorAnioAnterior = info?.resultado?.[anioAnterior]?.[mes] ?? null;

  const variacionAnual = valorAnioAnterior != null
    ? valor - Number(valorAnioAnterior)
    : null;

  if (chart) chart.destroy();

  const cumple = valor >= meta;

  const ctx = canvas.getContext("2d");

  // 🎨 Gradiente moderno
  const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);

  if (cumple) {
    gradient.addColorStop(0, "#0d9488");
    gradient.addColorStop(1, "#0f766e");
  } else {
    gradient.addColorStop(0, "#ef4444");
    gradient.addColorStop(1, "#b91c1c");
  }

  chart = new Chart(canvas, {
    type: "bar",
    data: {
      labels: [""],
      datasets: [{
        data: [valor],
        borderRadius: 40,
        backgroundColor: gradient,
        barThickness: 65
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { top: 170, right: 25, left: 25 }
      },
      scales: {
        x: {
          min: 0,
          max: 100,
          grid: {
            color: "#e5e7eb",
            drawBorder: false
          },
          ticks: {
            color: "#64748b",
            font: { size: 12 },
            callback: (value) => value + "%"
          }
        },
        y: { display: false }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      animation: {
        duration: 1200,
        easing: "easeOutQuart"
      }
    },
    plugins: [

      // 🎯 Línea de META
      {
        id: "metaLine",
        afterDraw(chart) {
          const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
          const metaX = x.getPixelForValue(meta);

          ctx.save();

          ctx.beginPath();
          ctx.setLineDash([5, 5]);
          ctx.moveTo(metaX, top);
          ctx.lineTo(metaX, bottom);
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#1f2937";
          ctx.stroke();

          ctx.setLineDash([]);
          ctx.font = "600 13px Inter, sans-serif";
          ctx.fillStyle = "#1f2937";
          ctx.textAlign = "center";
          ctx.fillText(`Meta ${meta}%`, metaX, top - 10);

          ctx.restore();
        }
      },

      // 💎 KPI Ejecutivo Superior
      {
        id: "kpiLabel",
        afterDraw(chart) {

          const { ctx, chartArea: { left, right, top } } = chart;
          const centerX = (left + right) / 2;

          ctx.save();

          // 🔢 Número principal
          const numeroY = top - 70;

          ctx.font = "800 54px Inter, sans-serif";
          ctx.fillStyle = cumple ? "#0f766e" : "#b91c1c";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`${valor.toFixed(2)}%`, centerX, numeroY);

          // 🔽 Variaciones debajo
          let yPos = numeroY + 38;

          function dibujarVariacion(texto, variacion, colorPos, colorNeg) {
            if (variacion == null) return;

            let simbolo = "●";
            let color = "#94a3b8";

            if (variacion > 0) {
              simbolo = "▲";
              color = colorPos;
            } else if (variacion < 0) {
              simbolo = "▼";
              color = colorNeg;
            }

            ctx.font = "500 14px Inter, sans-serif";
            ctx.fillStyle = color;
            ctx.fillText(
              `${simbolo} ${Math.abs(variacion).toFixed(2)}% ${texto}`,
              centerX,
              yPos
            );

            yPos += 22;
          }

          dibujarVariacion("vs mes anterior", variacionMes, "#16a34a", "#dc2626");
          dibujarVariacion("vs año anterior", variacionAnual, "#2563eb", "#b91c1c");

          ctx.restore();
        }
      }
    ]
  });

  mostrarModalImpactante(Number(valor), Number(meta), anio, mes, ind);
}

function crearLineaTendencia(anio, mesesSel, inds, canvas) {

  const datasets = inds.flatMap((ind, i) => {
    const color = palette[i % palette.length];

    // Gradiente
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height || 400);
    gradient.addColorStop(0, hexToRgba(color, 0.45));
    gradient.addColorStop(1, hexToRgba(color, 0.08));

    const valores = labels.map(m => indicadores[ind].resultado[anio]?.[m] ?? null);

    // META: normalizo a 0–100 si viene en 0–1
    const metaBruta = indicadores[ind].meta;          // puede ser 0.95 ó 95

    return [

        label: indicadores[ind].nombre,

        borderColor: color,
        backgroundColor: gradient,
        fill: true,
        tension: 0.38,
        pointRadius: 4,

  chart = new Chart(canvas, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          // aunque lo ocultes, fija límites para que no “aplasten” las líneas
          display: false,

        legend: {
          position: "bottom",
          labels: { padding: 16, font: { size: 13, weight: "600" } }

        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${percentFormatter(ctx.parsed.y)}`
          }

        datalabels: {
          display: true,
          color: "#fff",
          font: { weight: "700", size: 12 },
          backgroundColor: (ctx) => ctx.dataset.borderColor,
          borderRadius: 6,
          padding: 6,
          anchor: "center",
          align: "center",
          shadowColor: "rgba(0,0,0,0.35)",

  });

function hexToRgba(hex, alpha = 1) {
  const bigint = parseInt(hex.replace("#", ""), 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function hexToRgba(hex, alpha = 1) {
  const c = hex.replace("#", "");
  const bigint = parseInt(c, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}


function hexToRgba(hex, alpha = 1) {
  const c = hex.replace("#", "");
  const bigint = parseInt(c, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}


/* ===========================
   KPIs
=========================== */

function calcularKPIs(anio, mesesSel = [], inds = []) {
  if (!anio || !Array.isArray(inds) || inds.length === 0) {
    console.warn("Año o indicadores no proporcionados.");
    return;
  }

  const mesesEvaluar = mesesSel.length ? mesesSel : Object.keys(indicadores[inds[0]]?.resultado?.[anio] || {});
  if (mesesEvaluar.length === 0) {
    console.warn(`No hay meses válidos para el año ${anio}`);
    return;
  }

  let valores = [];
  let metas = [];

  inds.forEach(ind => {
    const indicador = indicadores[ind];
    if (!indicador) {
      console.warn(`Indicador "${ind}" no encontrado`);
      return;
    }

    mesesEvaluar.forEach(mes => {
      const val = indicador?.resultado?.[anio]?.[mes];
      if (val != null && !isNaN(val)) {
        valores.push(Number(val));
        metas.push(Number(indicador.meta));
      }
    });
  });

  if (valores.length === 0) {
    console.warn("No se encontraron valores válidos para calcular KPI.");
    return;
  }

  // Cálculo de promedios
  const promedio = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
  const resultadoProm = promedio(valores);
  const metaProm = promedio(metas);

  // Actualizar UI de forma segura
  const setKPI = (selector, value) => {
    const el = document.querySelector(selector);
    if (el) el.innerText = value;
  };

  setKPI("#kpiResultado .kpi-value", `${resultadoProm.toFixed(2)}%`);
  setKPI("#kpiMeta .kpi-value", `${metaProm.toFixed(2)}%`);
  setKPI("#kpiPeriodo .kpi-value", anio);

  // Determinar cumplimiento
  const cumple = resultadoProm >= metaProm;
  setKPI("#kpiEstatus .kpi-value", cumple ? "CUMPLE" : "NO CUMPLE");

  const kpi = document.getElementById("kpiEstatus");
  if (kpi) {
    kpi.classList.remove("kpi-ok", "kpi-bad");
    kpi.classList.add(cumple ? "kpi-ok" : "kpi-bad");
  }

  // Retornar un objeto con los datos por si se quiere usar programáticamente
  return {
    resultadoProm,
    metaProm,
    cumple,
    anio,
    mesesEvaluar,
    indicadores: inds
  };
}

  });

    btn.style.background = "var(--brand)";
    btn.style.transform = "translateY(0)";
    btn.style.boxShadow = "0 10px 20px rgba(10,59,114,.25)";
  });

  // Montaje
  body.appendChild(grid);
  body.appendChild(progresoWrap);
  body.appendChild(p);
  body.appendChild(btn);
  card.appendChild(header);
  card.appendChild(body);
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  // ====== Confeti o shake ======
  if (cumple) {
    for (let i = 0; i < 18; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      const hue = 120 + Math.round(Math.random() * 60); // verdes/azules
      c.style.background = `hsl(${hue} 80% 50%)`;
      c.style.left = `${50 + (Math.random() * 50 - 25)}%`;
      c.style.animationDelay = `${Math.random() * 0.25}s`;
      c.style.transform = `translateY(-20px) rotate(${Math.random() * 180}deg)`;
      overlay.appendChild(c);
      setTimeout(() => c.remove(), 1700);
    }
  } else {
    card.style.animation = "shake .45s ease";
  }

  // ====== Cierre y accesibilidad ======
  const cerrar = () => {
    overlay.remove();
    document.body.style.overflow = prevOverflow || "";
    document.removeEventListener("keydown", onKey);
  };
  const onKey = (e) => { if (e.key === "Escape") cerrar(); };
  document.addEventListener("keydown", onKey);

  overlay.addEventListener("click", (e) => { if (e.target === overlay) cerrar(); });
  btn.addEventListener("click", cerrar);
  btnX.addEventListener("click", cerrar);

  // Foco inicial
  btn.focus();
}

/* ===========================
   EVENTOS
=========================== */

document.getElementById("applyFilter").addEventListener("click", actualizarDashboard);
document.getElementById("resetFilter").addEventListener("click", () => location.reload());

/* Primer render */
actualizarDashboard();

</script>
