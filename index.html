function formatSpecial(value){
  if (value === null || value === undefined) return "$0";

  if (value >= 10000) {
    // Valores grandes → mm
    return "$" + value.toLocaleString("es-CO", { maximumFractionDigits: 3 }) + " MM";
  } else {
    // Valores menores → M
    return "$" + value.toLocaleString("es-CO", { maximumFractionDigits: 3 }) + " M";
  }
}

function construirTabla(tabla, datos, columnasVisibles) {
  const thead = tabla.querySelector("thead tr");
  const tbody = tabla.querySelector("tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  if (datos.length === 0) {
    tbody.innerHTML = "<tr><td colspan='10'>Sin datos</td></tr>";
    return;
  }

  // Columnas a ocultar por defecto
  const ocultar = ["AÑO", "Tipo", "Periodo de Egreso"];
  const cols = columnasVisibles || Object.keys(datos[0]).filter(c => !ocultar.includes(c));

  // Encabezados
  cols.forEach(c => {
    const th = document.createElement("th");
    th.textContent = c;
    thead.appendChild(th);
  });

  // Filas
  datos.forEach(row => {
    const tr = document.createElement("tr");

    cols.forEach(c => {
      const td = document.createElement("td");
      const valor = row[c];

      if (typeof valor === "number") {
        // Si es porcentaje entre 0 y 1
        if (valor >= 0 && valor <= 1) {
          td.textContent = (valor * 100).toFixed(0) + "%";
        } else {
          // Si es número grande → formato especial con $ y mm/M
          td.textContent = formatSpecial(valor);
        }
      } else {
        td.textContent = valor;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

async function exportDashboard() {
  // 1️⃣ Crear archivo Excel con datos y tablas
  const wb = XLSX.utils.book_new();

  // Hoja "Gasto" → datos generales
  if (data && data.length > 0) {
    const wsGasto = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, wsGasto, "Gasto");
  }

  // Hoja "Tablas" → dataTabla separada por tipo
  if (dataTabla && dataTabla.length > 0) {
    const tipos = [...new Set(dataTabla.map(d => d.Tipo))];

    tipos.forEach(tipo => {
      const datosTipo = dataTabla.filter(d => d.Tipo === tipo).map(d => {
        const row = {
          Año: d.AÑO,
          Mes: d.MES,
          "Periodo de Egreso": d["Periodo de Egreso"]
        };
        Object.keys(d).forEach(k => {
          if (!["AÑO","MES","Tipo","Periodo de Egreso"].includes(k)) {
            row[k] = k === "% Oportunidad" ? (d[k]*100).toFixed(2) + "%" : d[k];
          }
        });
        return row;
      });
      const ws = XLSX.utils.json_to_sheet(datosTipo);
      XLSX.utils.book_append_sheet(wb, ws, tipo);
    });
  }

  XLSX.writeFile(wb, `Dashboard_Gasto_Provision_${new Date().getFullYear()}.xlsx`);

  // 2️⃣ Exportar gráficas como PNG
  const chartCanvases = [
    { canvas: document.getElementById("trendChart"), name: "Grafico_Tendencia" },
    { canvas: document.getElementById("barCylinderChart"), name: "Grafico_Cilindro" }
  ];

  chartCanvases.forEach(ch => {
    if (ch.canvas) {
      const url = ch.canvas.toDataURL("image/png");
      downloadImage(url, ch.name + ".png");
    }
  });

  // 3️⃣ Exportar tablas HTML como PNG
  const tablas = [
    { element: document.getElementById("tablaLicencias"), name: "Tabla_Licencias" },
    { element: document.getElementById("tablaIncapacidades"), name: "Tabla_Incapacidades" }
  ];

  for (const tbl of tablas) {
    if (tbl.element) {
      await html2canvas(tbl.element, { scale: 2 }).then(canvas => {
        const url = canvas.toDataURL("image/png");
        downloadImage(url, tbl.name + ".png");
      });
    }
  }

  alert("✅ Exportación del Dashboard completada");
}

// Función auxiliar para descargar imágenes
function downloadImage(dataURL, filename) {
  const link = document.createElement("a");
  link.href = dataURL;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* ----------------------------------------- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow-x: hidden;
  font-family: 'Inter', sans-serif;
  background-color: #f5f7fa;
  color: #2c3e50;
  line-height: 1.5;
}

/* ----------------------------------------- */
/* Header                                    */
/* ----------------------------------------- */
header {
  padding: 1rem 1.5rem;
  font-size: 1.8rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #fff;
  background: linear-gradient(135deg, #003366, #00509e, #0074d9);
  text-shadow: rgba(0,0,0,0.5) 2px 2px 5px;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
  user-select: none;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

/* ----------------------------------------- */
/* Contenedor principal                      */
/* ----------------------------------------- */
.container {
  display: flex;
  height: calc(100vh - 4.5rem);
  width: 100vw;
  max-width: 100vw;
  padding: 0;
  margin: 0;
  overflow-x: hidden;
  background: #f5f7fa;
}

/* ----------------------------------------- */
/* Sidebar                                  */
/* ----------------------------------------- */
.sidebar {
  flex: 0 0 260px;
  min-width: 260px;
  background: linear-gradient(145deg, #002244, #004080);
  color: #e0e7ff;
  padding: 28px 24px;
  border-right: 2px solid rgba(255,255,255,0.2);
  overflow-y: auto;
  position: sticky;
  top: 4.5rem;
  height: calc(100vh - 4.5rem);
  box-sizing: border-box;
  user-select: none;
  box-shadow: inset -5px 0 15px rgba(0,0,0,0.15);
}

/* Sidebar Labels */
.sidebar label {
  display: block;
  font-weight: 700;
  margin: 1.2rem 0 0.6rem 0;
  font-size: 1.05rem;
  color: #b8c6ff;
  letter-spacing: 0.8px;
}

/* Sidebar Selects */
.sidebar select {
  width: 100%;
  padding: 14px 18px;
  margin-bottom: 1.4rem;
  border-radius: 14px;
  font-size: 1.1rem;
  cursor: pointer;
  border: none;
  background-color: #122a68;
  color: #e0e7ff;
  box-shadow: inset 0 2px 6px rgba(255,255,255,0.15);
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  font-weight: 600;
}

.sidebar select:hover, .sidebar select:focus {
  background-color: #1a3a99;
  box-shadow: 0 0 10px rgba(74,168,255,0.7);
  outline: none;
}

/* Sidebar Buttons */
.sidebar-controls button {
  width: 100%;
  padding: 16px 18px;
  border: none;
  border-radius: 18px;
  font-weight: 700;
  font-size: 1.15rem;
  cursor: pointer;
  transition: transform 0.35s ease, box-shadow 0.35s ease, background-color 0.35s ease;
  color: #fff;
  margin-bottom: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  background-image: linear-gradient(145deg, #004080, #00509e);
  letter-spacing: 0.8px;
  user-select: none;
}

.btn-apply {
  background-image: linear-gradient(145deg, #003366, #0066cc);
}
.btn-apply:hover {
  background-image: linear-gradient(145deg, #00509e, #0074d9);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0,92,230,0.5);
}

.btn-delete {
  background-image: linear-gradient(145deg, #b00000, #ff2a2a);
  box-shadow: 0 6px 15px rgba(180,0,0,0.5);
}
.btn-delete:hover {
  background-image: linear-gradient(145deg, #ff3d3d, #ff6666);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(255,60,60,0.6);
}

.btn-excel {
  background-image: linear-gradient(145deg, #004d00, #28a745);
  box-shadow: 0 6px 15px rgba(0,120,0,0.5);
}
.btn-excel:hover {
  background-image: linear-gradient(145deg, #28a745, #62d26f);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(80,200,100,0.6);
}

.btn-recobros {
  background-image: linear-gradient(145deg, #002060, #1f5bb6);
  box-shadow: 0 6px 15px rgba(15,40,100,0.5);
}
.btn-recobros:hover {
  background-image: linear-gradient(145deg, #2e53b4, #879ae4);
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(110,140,240,0.6);
}

/* ----------------------------------------- */
/* Contenido principal                      */
/* ----------------------------------------- */
.main-content {
  flex-grow: 1;
  width: calc(100vw - 260px);
  max-width: calc(100vw - 260px);
  padding: 2rem 28px;
  overflow-y: auto;
  overflow-x: hidden;
  background: linear-gradient(180deg, #ffffff, #e9f0ff);
  border-radius: 0 0 20px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  user-select: none;
}

/* ----------------------------------------- */
/* KPIs container                           */
/* ----------------------------------------- */
.kpi-container {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: space-between;
}

.kpi-box {
  flex: 1 1 200px; /* tamaño más compacto */
  background: linear-gradient(135deg, #f0f4ff, #e0e6ff);
  padding: 20px 24px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0, 70, 255, 0.12);
  transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  cursor: default;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.kpi-box:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 35px rgba(0, 90, 255, 0.25);
  background: linear-gradient(135deg, #e8edff, #cfdcff);
}

.kpi-icon {
  font-size: 2rem; /* iconos más compactos */
  margin-bottom: 8px;
}

.kpi-box h4 {
  font-size: 1.2rem;
  font-weight: 700;
  color: #0a1d57;
  margin-bottom: 8px;
  letter-spacing: 0.6px;
}

.kpi-box p {
  font-size: 2rem; /* números más compactos */
  font-weight: 800;
  line-height: 1.1;
  text-shadow: 0 1px 4px rgba(0, 0, 70, 0.2);
}

/* Colores por KPI */
.kpi-gasto {
  color: #e74c3c; /* rojo */
  text-shadow: 0 1px 4px rgba(231, 76, 60, 0.5);
}

.kpi-provision {
  color: #3498db; /* azul */
  text-shadow: 0 1px 4px rgba(52, 152, 219, 0.5);
}


/* ----------------------------------------- */
/* Gráficas y mapa                         */
/* ----------------------------------------- */
canvas {
  display: block;
  width: 100% !important;
  max-height: 360px;
  height: auto !important;
  background-color: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.12);
  margin-bottom: 16px;
  padding: 8px;
  transition: box-shadow 0.3s ease;
}

canvas:hover {
  box-shadow: 0 12px 40px rgba(0,0,255,0.25);
}

#map {
  min-height: 360px;
  border-radius: 24px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.15);
  margin-bottom: 20px;
}

/* ----------------------------------------- */
/* Tabla avanzada                         */
/* ----------------------------------------- */
.table-wrapper {
  width: 100%;
  background: linear-gradient(145deg, #eaf1ff, #cfd9ff);
  border-radius: 20px;
  box-shadow: 0 10px 28px rgba(0, 0, 120, 0.18);
  overflow: hidden;
  margin-bottom: 28px;
  border: 1px solid #b7c4ff;
  user-select: none;
}

.table-wrapper .table-responsive {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.table-advanced {
  width: 100%;
  table-layout: fixed;
  border-collapse: separate;
  border-spacing: 0 6px;
  font-size: 0.95rem; /* 🔥 más compacto */
  color: #1f2d3d;
  margin: 0;
  min-width: 0 !important;
}

/* 🔥 ENCABEZADO MÁS ELEGANTE */
.table-advanced thead th {
  position: sticky;
  top: 0;
  background: linear-gradient(135deg, #001f5b, #0050c8);
  color: #ffffff;
  z-index: 5;
  padding: 10px 14px; /* 🔥 reducido */
  text-align: center;
  font-weight: 700; /* 🔥 menos pesado */
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-size: 0.85rem; /* 🔥 más pequeño */
  box-shadow: 0 3px 10px rgba(0, 80, 200, 0.3);
  border-radius: 16px 16px 0 0;
}

/* 🔥 CELDAS MÁS ARMÓNICAS */
.table-advanced th,
.table-advanced td {
  padding: 12px 14px; /* 🔥 menos altura */
  text-align: center;
  vertical-align: middle;
  background: #ffffffcc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500; /* 🔥 menos pesado */
  transition: all 0.25s ease;
  border-radius: 10px;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.02);
}

/* Filas alternadas más suaves */
.table-advanced tbody tr:nth-child(even) td {
  background: #eef3ffcc;
}

/* Hover más limpio */
.table-advanced tbody tr:hover td {
  background: #d9e6ff;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 80, 255, 0.2);
  color: #002b80;
  transform: scale(1.01);
}


/* Scrollbar personalizado */
.table-wrapper .table-responsive::-webkit-scrollbar {
  height: 10px;
}

.table-wrapper .table-responsive::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #0050c8, #00295c);
  border-radius: 6px;
}

/* ----------------------------------------- */
/* Barras de progreso                      */
/* ----------------------------------------- */
.progress-bar-container {
  width: 100%;
  background: #dde4ff;
  border-radius: 24px;
  height: 28px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 4px 8px rgba(0,0,128,0.1);
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #036717, #01480b);
  transition: width 0.7s ease;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
  color: #eef6ff;
  text-shadow: 1px 1px 5px rgba(0,0,70,0.7);
  user-select: none;
  border-radius: 24px 0 0 24px;
}

.progress-bar::after {
  content: attr(data-value);
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.9rem;
  font-weight: 900;
  color: #cfe1ff;
  text-shadow: 0 1px 4px rgba(0,0,100,0.8);
  white-space: nowrap;
}

/* ----------------------------------------- */
/* Fix margenes y anchuras                   */
/* ----------------------------------------- */
.kpi-container,
.charts-grid,
.table-wrapper {
  margin-left: 0 !important;
  margin-right: 0 !important;
  padding-left: 0 !important;
  padding-right: 0 !important;
  width: 100% !important;
  max-width: 100% !important;
}

/* ----------------------------------------- */
/* Responsive: mejor para móvil/tablet        */
/* ----------------------------------------- */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    height: auto;
  }

  .sidebar {
    width: 100%;
    min-width: 100%;
    position: relative;
    height: auto;
    padding: 20px 16px;
    border-right: none;
    box-shadow: none;
  }

  .main-content {
    width: 100% !important;
    max-width: 100% !important;
    padding: 20px 16px;
    border-radius: 0 0 12px 12px;
  }

  .kpi-container {
    flex-wrap: wrap;
    gap: 16px;
  }

  .kpi-box {
    flex: 1 1 100%;
  }

  .table-advanced {
    min-width: 0 !important;
  }
}
.table-caption {
  caption-side: top;
  font-size: 1.2rem; /* más pequeño que antes */
  font-weight: 600; /* un poco más ligero */
  text-transform: uppercase;
  letter-spacing: 1px; /* menos espacio entre letras */
  padding: 8px 0; /* menos alto */
  color: white;
  background: linear-gradient(90deg, #0072CE 0%, #4AA8FF 100%);
  border-radius: 8px 8px 0 0;
  box-shadow: 0 2px 6px rgba(0, 114, 206, 0.35); /* sombra más sutil */
  text-align: center;
}

.btn-image {
  padding: 10px 20px;
  background-color: #4AA8FF;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-left: 5px;
}

.btn-image:hover {
  background-color: #1E88E5;
}
.btn-export-dashboard {
  padding: 10px 20px;
  background-color: #4CAF50;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-left: 5px;
}

.btn-export-dashboard:hover {
  background-color: #388E3C;
}

</style>
